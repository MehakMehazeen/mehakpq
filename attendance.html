<!DOCTYPE html>
<html>
<head>
    <title>Attendance Sheet</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f2f2f2;
        }

        header {
            background: green;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            background: white;
            margin: 20px;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background: green;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        select {
            padding: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<header>
    <h1>ISLAMIAH WOMEN'S ARTS AND SCIENCE COLLEGE</h1>
    <h2>Student Attendance Sheet</h2>
</header>

<div class="container">

        </tr>

        </tr>

                <select>

                </select>

</div>

<script>

        alert("Attendance submitted successfully!");
    }
</script>

</body>
</html>
